# ── Research-Microservice ──────────────────────────────────────
# Start: docker compose up --build -d

services:
  research-service:
    build: .
    container_name: research-service
    restart: unless-stopped
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      API_KEY: ${RESEARCH_API_KEY}
    ports:
      - "127.0.0.1:5900:8000"
    networks:
      - vivahome

networks:
  vivahome:
    external: true
