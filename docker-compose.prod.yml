# ── Office – Produktions-Stack ─────────────────────────────────
#
# Usage on the server:
#   docker compose -f docker-compose.prod.yml --env-file .env.production build
#   docker compose -f docker-compose.prod.yml --env-file .env.production up -d
#
# DO NOT run `docker compose down -v` — that destroys Postgres + MinIO volumes.

services:
  postgres:
    image: postgres:16-alpine
    container_name: office-postgres
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - office_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - office

  minio:
    image: minio/minio:latest
    container_name: office-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    volumes:
      - office_minio_data:/data
    ports:
      - "127.0.0.1:5702:9000"
      - "127.0.0.1:5703:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - office

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    image: office-api:latest
    container_name: office-api
    restart: unless-stopped
    command: >
      sh -c "pnpm prisma migrate deploy &&
             pnpm prisma db seed &&
             node apps/api/dist/main.js"
    working_dir: /app
    env_file:
      - .env.production
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-8h}
      MINIO_ENDPOINT: minio
      MINIO_PORT: "9000"
      MINIO_USE_SSL: "false"
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_BUCKET: ${MINIO_BUCKET:-office-documents}
      WEB_ORIGIN: ${WEB_ORIGIN}
      API_PORT: "3801"
      NODE_ENV: production
      OCR_SERVICE_URL: ${OCR_SERVICE_URL:-http://ocr-service:8000}
      RESEARCH_SERVICE_URL: ${RESEARCH_SERVICE_URL:-http://research-service:8000}
      RESEARCH_API_KEY: ${RESEARCH_API_KEY}
    volumes:
      - /root/.ssh/office_monitor_key:/root/.ssh/host_key:ro
      - /root/.ssh/known_hosts:/root/.ssh/known_hosts:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "127.0.0.1:5701:3801"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
    networks:
      - office
      - vivahome

  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.web
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    image: office-web:latest
    container_name: office-web
    restart: unless-stopped
    environment:
      NODE_ENV: production
    ports:
      - "127.0.0.1:5700:3800"
    depends_on:
      - api
    networks:
      - office

networks:
  office:
    driver: bridge
  vivahome:
    external: true

volumes:
  office_postgres_data:
    name: office_postgres_data
  office_minio_data:
    name: office_minio_data
