# MinIO Console Nginx site config (Office)
# Deployment path: /opt/office/deploy/nginx/minio.office.vivahome.de.conf
#
# Copy/symlink on server:
#   /etc/nginx/sites-available/minio.office.vivahome.de.conf
#   /etc/nginx/sites-enabled/minio.office.vivahome.de.conf
#
# Then:
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d minio.office.vivahome.de

server {
    server_name minio.office.vivahome.de;

    client_max_body_size 256m;

    # MinIO Console (Web UI)
    location / {
        proxy_pass http://127.0.0.1:5703;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_cache_bypass $http_upgrade;
    }

    listen 80;
    listen [::]:80;
}
