# Office Nginx site config
# Deployment path: /opt/office/deploy/nginx/office.vivahome.de.conf
#
# Copy/symlink on server:
#   /etc/nginx/sites-available/office.vivahome.de.conf
#   /etc/nginx/sites-enabled/office.vivahome.de.conf
#
# Then:
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d office.vivahome.de

server {
    server_name office.vivahome.de;

    client_max_body_size 64m;

    # API (NestJS) — longer timeouts for uploads and heavy operations.
    location /api {
        proxy_pass http://127.0.0.1:5701;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 30s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;
        send_timeout 600s;
    }

    # Web (Next.js)
    location / {
        proxy_pass http://127.0.0.1:5700;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_cache_bypass $http_upgrade;
    }

    listen 80;
    listen [::]:80;
}
